<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyberpunk Filipino-Made Accessories</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="Style_1.css" />

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background-color: #111;
  color: #fff;
  line-height: 1.6;
}

.landing-container {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

@media (min-width: 768px) {
  .landing-container {
    flex-direction: row;
  }
}

.hero {
  flex: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f0f0f, #222);
  padding: 40px;
  position: relative;
  overflow: hidden;
}

.hero-content {
  max-width: 600px;
  text-align: center;
  z-index: 2;
}

.hero h1 {
  font-size: 2.5em;
  color: #0ff;
  text-shadow: 0 0 10px #0ff;
  margin-bottom: 20px;
}

.hero p {
  font-size: 1.2em;
  color: #ccc;
}

.hero-image {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 40%;
  background: url('https://www.deviantart.com/rocksdanister/art/Night-City-Cyberpunk-840875135') no-repeat center/cover;
  opacity: 0.8;
  z-index: 1;
}

.signup-column {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  background-color: #1a1a1a;
}

.signup-box {
  background: #222;
  padding: 30px;
  border-radius: 10px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 0 20px #0ff;
  text-align: center;
}

.signup-box h2 {
  margin-bottom: 20px;
  font-size: 2em;
  color: #0ff;
}

.signup-box p {
  margin-bottom: 20px;
  font-size: 1em;
  color: #ccc;
}

button {
  cursor: pointer;
}

#continueBtn {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:8px;
  background:var(--neon-pink);
  font-weight:bold;
}

#mainSignUpBtn {
  background: var(--neon-pink);
  border: none;
  padding: 15px 30px;
  font-size: 1.2em;
  border-radius: 10px;
  font-weight: bold;
}

#mainSignUpBtn:hover {
  background: #ff4081;
}

footer {
  padding: 30px 20px;
  background-color: #111;
  border-top: 2px solid var(--neon-blue);
  text-align: center;
  font-size: 0.9em;
  color: #aaa;
}

footer a {
  margin: 0 10px;
  color: #fff;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="landing-container">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="glitch">ACCESSORIES MADE FOR FUTURE CENTURIES</h1>
      <p>Dress for the galaxies beyond your reach.</p>

      <button id="continueBtn">
        Continue Without an Account
      </button>
    </div>
    <div class="hero-image"></div>
  </section>

  <!-- Sign Up -->
  <section class="signup-column">
    <div class="signup-box">
      <h2>Join Our Exclusive Community</h2>
      <p>Register now to unlock special offers and updates.</p>
      <button id="mainSignUpBtn">Sign Up</button>
    </div>
  </section>

</div>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Trinkkl.ph | All rights reserved.</p>
  <div>
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">Facebook</a>
  </div>
</footer>

<!-- Sign Up Overlay -->
<div id="signUpOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(17,17,17,0.8); z-index:10000;">
  <div style="margin:50px auto; background:#222; padding:20px; border-radius:10px; max-width:400px; position:relative;">
    
    <div id="closeSignUp" style="position:absolute; top:10px; right:15px; font-size:1.5em; cursor:pointer;">&times;</div>

    <h2>Sign Up</h2>
    <input type="text" placeholder="Enter your name..." style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:10px;">
    <button style="margin-top:10px; padding:10px 20px; border:none; border-radius:5px; background:#0ff; color:#000; font-weight:bold;">Submit</button>

  </div>
</div>

<!-- Scripts -->
<script>
function goHome() {
  window.location.href = "./homepage.html";
}

document.getElementById("continueBtn").addEventListener("click", goHome);

document.getElementById("mainSignUpBtn").onclick = function() {
  document.getElementById("signUpOverlay").style.display = "block";
};

document.getElementById("closeSignUp").onclick = function() {
  document.getElementById("signUpOverlay").style.display = "none";
};
</script>

</body>
</html>
